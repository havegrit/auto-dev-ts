<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>auto-dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 2rem; color: #58a6ff; letter-spacing: -0.02em; }
    h1 span { color: #8b949e; font-weight: 400; font-size: 1rem; margin-left: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #8b949e; margin-bottom: 0.75rem; }
    .stat { font-size: 2rem; font-weight: 700; color: #e6edf3; }
    .stat-sub { font-size: 0.8rem; color: #8b949e; margin-top: 0.25rem; }
    .agents { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .badge { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.75rem; color: #79c0ff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: #8b949e; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #21262d; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; color: #c9d1d9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .status { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .DONE    { background: #1a4731; color: #3fb950; }
    .FAILED  { background: #3b1219; color: #f85149; }
    .RUNNING { background: #1c2d4a; color: #58a6ff; }
    .BLOCKED { background: #2d2800; color: #e3b341; }
    .agent-name { font-family: monospace; color: #79c0ff; }
    .duration { color: #8b949e; font-size: 0.78rem; }
    .output-preview { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #8b949e; font-size: 0.78rem; }
    .refresh { background: none; border: 1px solid #30363d; color: #8b949e; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; float: right; }
    .refresh:hover { border-color: #58a6ff; color: #58a6ff; }
    .section-title { font-size: 0.85rem; font-weight: 600; color: #8b949e; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }

    /* Submit panel */
    .submit-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .submit-card h2 { font-size: 0.85rem; font-weight: 600; color: #e6edf3; margin-bottom: 1rem; }
    .form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
    .form-row label { font-size: 0.8rem; color: #8b949e; white-space: nowrap; }
    select, input[type="text"] {
      background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.85rem; flex: 1;
    }
    select:focus, input[type="text"]:focus { outline: none; border-color: #58a6ff; }

    /* Project combobox */
    .combobox { position: relative; display: flex; flex: 1; min-width: 0; }
    .combobox input[type="text"] {
      flex: 1; min-width: 0;
      border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none;
    }
    .combobox-toggle {
      background: #0d1117; border: 1px solid #30363d; color: #8b949e;
      border-radius: 0 6px 6px 0; padding: 0 0.65rem; cursor: pointer;
      font-size: 0.65rem; line-height: 1; flex-shrink: 0;
    }
    .combobox-toggle:hover { color: #58a6ff; border-color: #58a6ff; }
    .combobox.open .combobox-toggle { color: #58a6ff; border-color: #58a6ff; }
    .combobox-menu {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 30;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      max-height: 240px; overflow-y: auto; display: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    }
    .combobox.open .combobox-menu { display: block; }
    .combobox-item {
      padding: 0.45rem 0.7rem; font-size: 0.82rem; font-family: monospace;
      color: #c9d1d9; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .combobox-item:hover, .combobox-item.active { background: #1c2d4a; color: #58a6ff; }
    .combobox-empty { padding: 0.5rem 0.7rem; font-size: 0.78rem; color: #8b949e; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 0.5rem; }
    .tab {
      background: none; border: 1px solid #30363d; color: #8b949e;
      padding: 0.35rem 0.9rem; font-size: 0.8rem; cursor: pointer;
    }
    .tab:first-child { border-radius: 6px 0 0 6px; }
    .tab:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
    .tab.active { background: #21262d; color: #58a6ff; border-color: #58a6ff; }
    textarea {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #e6edf3; border-radius: 6px; padding: 0.6rem 0.75rem;
      font-size: 0.85rem; font-family: inherit; resize: vertical; min-height: 100px;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    .drop-zone {
      border: 2px dashed #30363d; border-radius: 6px; padding: 2rem;
      text-align: center; color: #8b949e; font-size: 0.85rem; cursor: pointer;
      transition: border-color 0.15s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #58a6ff; color: #58a6ff; }
    .file-name { font-size: 0.8rem; color: #3fb950; margin-top: 0.4rem; }
    .run-btn {
      background: #1f6feb; border: none; color: #fff;
      padding: 0.5rem 1.4rem; border-radius: 6px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; margin-top: 0.75rem;
    }
    .run-btn:hover { background: #388bfd; }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    /* Result panel */
    .result-panel { display: none; margin-top: 1rem; border-top: 1px solid #21262d; padding-top: 1rem; }
    .result-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; font-size: 0.82rem; color: #8b949e; }
    .result-output {
      background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
      padding: 0.75rem; font-family: monospace; font-size: 0.78rem; color: #c9d1d9;
      white-space: pre-wrap; max-height: 400px; overflow-y: auto;
    }
    /* Rendered markdown output */
    .result-output.md-body { font-family: inherit; font-size: 0.85rem; white-space: normal; line-height: 1.55; }
    .md-body > *:first-child { margin-top: 0; }
    .md-body > *:last-child { margin-bottom: 0; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 { color: #e6edf3; line-height: 1.3; margin: 1rem 0 0.5rem; font-weight: 600; }
    .md-body h1 { font-size: 1.25rem; border-bottom: 1px solid #21262d; padding-bottom: 0.3rem; }
    .md-body h2 { font-size: 1.1rem; border-bottom: 1px solid #21262d; padding-bottom: 0.25rem; }
    .md-body h3 { font-size: 0.98rem; }
    .md-body p { margin: 0.5rem 0; }
    .md-body ul, .md-body ol { margin: 0.5rem 0; padding-left: 1.4rem; }
    .md-body li { margin: 0.2rem 0; }
    .md-body a { color: #58a6ff; text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body code { background: #161b22; border: 1px solid #21262d; border-radius: 4px; padding: 0.1rem 0.3rem; font-family: monospace; font-size: 0.82em; }
    .md-body pre { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 0.7rem; overflow-x: auto; margin: 0.6rem 0; }
    .md-body pre code { background: none; border: none; padding: 0; font-size: 0.8rem; }
    .md-body blockquote { margin: 0.6rem 0; padding: 0.1rem 0.8rem; border-left: 3px solid #30363d; color: #8b949e; }
    .md-body table { border-collapse: collapse; margin: 0.6rem 0; font-size: 0.82rem; }
    .md-body th, .md-body td { border: 1px solid #30363d; padding: 0.3rem 0.6rem; text-align: left; }
    .md-body th { background: #161b22; }
    .md-body hr { border: none; border-top: 1px solid #21262d; margin: 0.8rem 0; }
    .md-body img { max-width: 100%; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub-runs { margin-top: 0.75rem; }
    .sub-run-row { display: flex; gap: 0.5rem; align-items: center; font-size: 0.78rem; padding: 0.25rem 0; color: #8b949e; }
    .sub-run-row .agent-name { font-size: 0.78rem; }

    /* Config panel */
    .config-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .config-card h2 { font-size: 0.85rem; font-weight: 600; color: #e6edf3; margin-bottom: 1rem; }
    .config-row { display: flex; gap: 1.5rem; align-items: flex-start; flex-wrap: wrap; }
    .config-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 200px; }
    .config-group label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em; }
    .effort-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .effort-btn {
      background: #21262d; border: 1px solid #30363d; color: #8b949e;
      padding: 0.3rem 0.75rem; border-radius: 5px; font-size: 0.8rem; cursor: pointer;
    }
    .effort-btn.active { background: #1c2d4a; border-color: #58a6ff; color: #58a6ff; }
    .effort-btn:hover:not(.active) { border-color: #8b949e; color: #e6edf3; }
    .save-btn {
      background: #238636; border: none; color: #fff;
      padding: 0.35rem 1rem; border-radius: 6px; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; align-self: flex-end;
    }
    .save-btn:hover { background: #2ea043; }
    .save-status { font-size: 0.75rem; color: #3fb950; align-self: flex-end; }
    .circuit-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
    .circuit-CLOSED { background: #1a4731; color: #3fb950; }
    .circuit-OPEN   { background: #3b1219; color: #f85149; }
    tr.run-row { cursor: pointer; }
    tr.run-row:hover td { background: #1c2128; }
    tr.run-row.selected td { background: #1c2d4a; }
    .detail-chip { background: #21262d; border-radius: 4px; padding: 0.15rem 0.5rem; font-family: monospace; font-size: 0.75rem; color: #c9d1d9; }
    .detail-chip.error { background: #3b1219; color: #f85149; }
    .live-log { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.75rem; max-height: 300px; overflow-y: auto; }
    .log-line { padding: 0.15rem 0; border-bottom: 1px solid #161b22; display: flex; gap: 0.5rem; align-items: flex-start; }
    .log-line:last-child { border-bottom: none; }
    .log-ts { color: #484f58; white-space: nowrap; flex-shrink: 0; }
    .log-type-tool_call   { color: #79c0ff; }
    .log-type-tool_result { color: #56d364; }
    .log-type-text        { color: #c9d1d9; }
    .log-type-status      { color: #e3b341; font-weight: 600; }
    .live-badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: #58a6ff; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #58a6ff; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <h1>auto-dev <span>Claude Code SDK 에이전트</span></h1>

  <!-- 통계 카드 -->
  <div class="grid">
    <div class="card" style="margin-bottom:0">
      <h2>오늘 실행</h2>
      <div class="stat" id="today-runs">—</div>
      <div class="stat-sub" id="today-limit">—</div>
    </div>
    <div class="card" style="margin-bottom:0">
      <h2>전체 실행</h2>
      <div class="stat" id="total-runs">—</div>
    </div>
    <div class="card" style="margin-bottom:0">
      <h2>상태</h2>
      <div style="margin-bottom:0.5rem">
        <div style="font-size:0.72rem;color:#8b949e;margin-bottom:0.3rem">API Rate Limit</div>
        <div id="circuit-status">—</div>
      </div>
      <div style="font-size:0.72rem;color:#8b949e;margin-bottom:0.2rem">에이전트</div>
      <div class="agents" id="agents"></div>
    </div>
  </div>

  <!-- 모델 & Effort 설정 -->
  <div class="config-card">
    <h2>모델 설정</h2>
    <div class="config-row">
      <div class="config-group">
        <label>모델</label>
        <select id="model-select"></select>
      </div>
      <div class="config-group">
        <label>Effort</label>
        <div class="effort-btns" id="effort-btns"></div>
      </div>
      <button class="save-btn" onclick="saveConfig()">저장</button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <!-- 새 요청 실행 -->
  <div class="submit-card">
    <h2>새 요청 실행</h2>

    <div class="form-row">
      <label>에이전트</label>
      <select id="agent-select">
        <option value="spec">전체 워크플로우 (clarifier → planner → scaffold → test → review → cicd)</option>
        <option value="scaffold">scaffold — 코드 스캐폴딩</option>
        <option value="review">review — 코드 리뷰</option>
        <option value="test">test — 테스트 생성</option>
        <option value="cicd">cicd — CI/CD 설정</option>
        <option value="planner">planner — 개발 계획</option>
        <option value="clarifier">clarifier — 스펙 명확화</option>
      </select>
    </div>

    <div id="spec-steps-row" class="form-row" style="display:none">
      <label>단계 (선택)</label>
      <input type="text" id="spec-steps" placeholder="scaffold,test,review (비워두면 전체)" />
    </div>

    <div class="form-row">
      <label>프로젝트명</label>
      <div class="combobox" id="project-combobox">
        <input type="text" id="project-input" autocomplete="off" placeholder="프로젝트명 (비우면 워크스페이스 루트)" style="font-family:monospace;font-size:0.82rem" />
        <button type="button" class="combobox-toggle" id="project-toggle" aria-label="프로젝트 목록 열기">▼</button>
        <div class="combobox-menu" id="project-menu"></div>
      </div>
      <span id="workspace-hint" style="color:#8b949e;font-size:0.72rem;white-space:nowrap"></span>
    </div>

    <div class="tab-bar">
      <button class="tab active" onclick="setTab('text')">텍스트</button>
      <button class="tab" onclick="setTab('file')">파일</button>
    </div>

    <div id="tab-text">
      <textarea id="text-input" placeholder="스펙 또는 요청 내용을 입력하세요..."></textarea>
    </div>

    <div id="tab-file" style="display:none">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleDrop(event)">
        파일을 끌어다 놓거나 클릭해서 선택<br>
        <small style="color:#484f58">(.md .txt .json .yaml .yml)</small>
      </div>
      <input type="file" id="file-input" accept=".md,.txt,.json,.yaml,.yml" style="display:none" onchange="handleFileSelect(this)" />
      <div class="file-name" id="file-name"></div>
    </div>

    <button class="run-btn" id="run-btn" onclick="submitRequest()">실행</button>

    <!-- 결과 패널 -->
    <div class="result-panel" id="result-panel">
      <div class="result-header">
        <div id="result-spinner" class="spinner" style="display:none"></div>
        <span id="result-status-label">대기 중</span>
        <span id="result-run-id" style="font-family:monospace;font-size:0.72rem;color:#484f58"></span>
        <button id="result-output-toggle" class="refresh" style="display:none;margin-left:auto" onclick="toggleOutput('result-output', this)">원본</button>
      </div>
      <div class="sub-runs" id="sub-runs"></div>
      <div class="result-output" id="result-output" style="display:none"></div>
    </div>
  </div>

  <!-- 최근 실행 -->
  <div class="card">
    <div class="section-title">
      최근 실행 <button class="refresh" onclick="loadStats()">새로고침</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>에이전트</th><th>상태</th><th>소요시간</th><th>턴</th><th>출력 / 원인</th><th>시작시간</th>
        </tr>
      </thead>
      <tbody id="runs"></tbody>
    </table>
  </div>

  <!-- 실행 상세 패널 -->
  <div class="card" id="run-detail-panel" style="display:none">
    <div class="section-title">
      <span id="run-detail-title">실행 상세</span>
      <button class="refresh" onclick="closeRunDetail()">닫기</button>
    </div>
    <div id="run-detail-meta" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;font-size:0.78rem;color:#8b949e"></div>

    <!-- 실시간 로그 (RUNNING 상태일 때) -->
    <div id="live-log-section" style="display:none;margin-bottom:0.75rem">
      <div style="font-size:0.75rem;color:#8b949e;margin-bottom:0.4rem;display:flex;align-items:center;gap:0.5rem">
        실시간 활동
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
      </div>
      <div class="live-log" id="live-log"></div>
    </div>

    <!-- 완료 후 출력 -->
    <div id="run-detail-output-section">
      <div style="font-size:0.75rem;color:#8b949e;margin-bottom:0.4rem;display:flex;align-items:center;justify-content:space-between">
        출력
        <button id="run-detail-output-toggle" class="refresh" style="display:none" onclick="toggleOutput('run-detail-output', this)">원본</button>
      </div>
      <div class="result-output" id="run-detail-output" style="max-height:400px"></div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="purify.min.js"></script>
  <script>
    let currentTab = 'text';
    let selectedFile = null;
    let pollTimer = null;
    let availableModels = [];
    let selectedEffort = 'high';
    let selectedRunId = null;
    let liveEventSource = null;

    // ── 마크다운 출력 렌더링 ─────────────────────────────────────────
    if (window.marked) marked.use({ gfm: true, breaks: true });

    // 출력 요소에 raw 텍스트를 저장하고 현재 모드(rendered/raw)대로 그린다.
    function applyOutput(el, mode) {
      const raw = el.__raw ?? '';
      if (mode === 'raw' || !window.marked || !window.DOMPurify) {
        el.classList.remove('md-body');
        el.textContent = raw;
        el.__mode = 'raw';
      } else {
        el.classList.add('md-body');
        el.innerHTML = DOMPurify.sanitize(marked.parse(raw));
        el.__mode = 'rendered';
      }
    }

    // 출력 텍스트 설정 + 토글 버튼 표시. 빈 문자열이면 토글 숨김.
    function setOutput(elId, toggleId, text) {
      const el = document.getElementById(elId);
      el.__raw = text ?? '';
      applyOutput(el, el.__mode ?? 'rendered');
      const btn = document.getElementById(toggleId);
      if (btn) {
        const has = !!(text && text.trim());
        btn.style.display = has ? '' : 'none';
        btn.textContent = el.__mode === 'raw' ? '렌더' : '원본';
      }
    }

    function clearOutput(elId, toggleId) {
      const el = document.getElementById(elId);
      el.__raw = '';
      el.classList.remove('md-body');
      el.textContent = '';
      const btn = document.getElementById(toggleId);
      if (btn) btn.style.display = 'none';
    }

    function toggleOutput(elId, btn) {
      const el = document.getElementById(elId);
      applyOutput(el, el.__mode === 'raw' ? 'rendered' : 'raw');
      btn.textContent = el.__mode === 'raw' ? '렌더' : '원본';
    }

    // agent 선택 시 spec-steps 표시
    document.getElementById('agent-select').addEventListener('change', function() {
      document.getElementById('spec-steps-row').style.display = this.value === 'spec' ? 'flex' : 'none';
    });

    async function loadConfig() {
      const cfg = await fetch('/api/config').then(r => r.json());
      availableModels = cfg.availableModels ?? [];

      // 모델 드롭다운 구성
      const sel = document.getElementById('model-select');
      sel.innerHTML = availableModels.map(m => {
        const label = m.description ? `${m.displayName} — ${m.description}` : m.displayName;
        return `<option value="${m.id}" ${m.id === cfg.model ? 'selected' : ''}>${label}</option>`;
      }).join('');

      // effort 버튼 구성 (선택된 모델 기준)
      selectedEffort = cfg.effort;
      renderEffortBtns(cfg.model, cfg.effort);

      sel.addEventListener('change', () => renderEffortBtns(sel.value, selectedEffort));
    }

    function renderEffortBtns(modelId, activeEffort) {
      const spec = availableModels.find(m => m.id === modelId);
      const levels = spec?.effortLevels ?? ['low', 'medium', 'high'];
      const btns = document.getElementById('effort-btns');
      // 이 모델이 effort를 지원하지 않으면 안내만 표시
      if (levels.length === 0) {
        selectedEffort = undefined;
        btns.innerHTML = '<span style="color:#8b949e;font-size:13px">이 모델은 effort 설정을 지원하지 않습니다.</span>';
        return;
      }
      // activeEffort가 이 모델에서 지원 안 되면 'high'로 fallback
      if (!levels.includes(activeEffort)) {
        selectedEffort = levels.includes('high') ? 'high' : levels[levels.length - 1];
      }
      btns.innerHTML = levels.map(l =>
        `<button class="effort-btn ${l === selectedEffort ? 'active' : ''}" onclick="selectEffort('${l}')">${l}</button>`
      ).join('');
    }

    function selectEffort(level) {
      selectedEffort = level;
      document.querySelectorAll('.effort-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === level);
      });
    }

    async function saveConfig() {
      const model = document.getElementById('model-select').value;
      const statusEl = document.getElementById('save-status');
      statusEl.textContent = '저장 중...';
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, effort: selectedEffort }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error ?? '저장 실패');
        }
        statusEl.textContent = '✓ 저장됨';
        setTimeout(() => { statusEl.textContent = ''; }, 2000);
      } catch (e) {
        statusEl.style.color = '#f85149';
        statusEl.textContent = e.message;
        setTimeout(() => { statusEl.style.color = '#3fb950'; statusEl.textContent = ''; }, 3000);
      }
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-text').style.display = tab === 'text' ? '' : 'none';
      document.getElementById('tab-file').style.display = tab === 'file' ? '' : 'none';
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if (file) {
        selectedFile = file;
        document.getElementById('file-name').textContent = `선택됨: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        document.getElementById('drop-zone').textContent = file.name;
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        selectedFile = file;
        document.getElementById('file-name').textContent = `선택됨: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        document.getElementById('drop-zone').textContent = file.name;
      }
    }

    async function submitRequest() {
      const agent = document.getElementById('agent-select').value;
      const formData = new FormData();
      formData.append('agent', agent);

      if (currentTab === 'text') {
        const txt = document.getElementById('text-input').value.trim();
        if (!txt) { alert('입력 내용을 작성하세요.'); return; }
        formData.append('input', txt);
      } else {
        if (!selectedFile) { alert('파일을 선택하세요.'); return; }
        formData.append('file', selectedFile);
      }

      if (agent === 'spec') {
        const steps = document.getElementById('spec-steps').value.trim();
        if (steps) formData.append('steps', steps);
      }

      const project = document.getElementById('project-input').value.trim();
      if (project) formData.append('project', project);

      // UI 초기화
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = '실행 중...';
      const panel = document.getElementById('result-panel');
      panel.style.display = '';
      document.getElementById('result-spinner').style.display = '';
      document.getElementById('result-status-label').textContent = '요청 전송 중...';
      document.getElementById('result-run-id').textContent = '';
      document.getElementById('sub-runs').innerHTML = '';
      document.getElementById('result-output').style.display = 'none';
      clearOutput('result-output', 'result-output-toggle');

      try {
        const res = await fetch('/api/submit', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(err.error ?? res.statusText);
        }
        const { runId, type } = await res.json();
        document.getElementById('result-run-id').textContent = runId.slice(0, 8) + '…';
        document.getElementById('result-status-label').textContent = '실행 중';
        pollRun(runId, type);
      } catch (err) {
        document.getElementById('result-spinner').style.display = 'none';
        document.getElementById('result-status-label').textContent = '오류: ' + err.message;
        btn.disabled = false;
        btn.textContent = '실행';
      }
    }

    function pollRun(runId, type) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const run = await fetch(`/api/runs/${runId}`).then(r => r.json());
          const statusEl = document.getElementById('result-status-label');
          const spinnerEl = document.getElementById('result-spinner');

          statusEl.innerHTML = `<span class="status ${run.status}">${run.status}</span>`;

          if (run.output) {
            document.getElementById('result-output').style.display = '';
            setOutput('result-output', 'result-output-toggle', run.output);
          }

          // 워크플로우면 sub-runs 폴링
          if (type === 'workflow') {
            const children = await fetch(`/api/runs/${runId}/children`).then(r => r.json());
            const subEl = document.getElementById('sub-runs');
            subEl.innerHTML = children.map(c => `
              <div class="sub-run-row">
                <span class="agent-name">${c.agent_name}</span>
                <span class="status ${c.status}">${c.status}</span>
                <span class="duration">${c.duration_ms ? (c.duration_ms / 1000).toFixed(1) + 's' : '—'}</span>
              </div>`).join('');
          }

          if (run.status === 'DONE' || run.status === 'FAILED' || run.status === 'BLOCKED') {
            clearInterval(pollTimer);
            spinnerEl.style.display = 'none';
            const btn = document.getElementById('run-btn');
            btn.disabled = false;
            btn.textContent = '실행';
            loadStats();
          }
        } catch (e) { /* 일시적 네트워크 오류 무시 */ }
      }, 2000);
    }

    async function loadStats() {
      const [statusRes, statsRes, runsRes] = await Promise.all([
        fetch('/api/status').then(r => r.json()),
        fetch('/api/stats').then(r => r.json()),
        fetch('/api/runs?limit=30').then(r => r.json()),
      ]);

      document.getElementById('today-runs').textContent = statsRes.todayCount ?? '—';
      const g = statusRes.guard;
      const limitEl = document.getElementById('today-limit');
      if (g) {
        limitEl.textContent = `한도 ${g.limit}회 중 ${g.count}회 사용`;
        limitEl.style.display = '';
      } else {
        limitEl.style.display = 'none';
      }
      document.getElementById('total-runs').textContent = statsRes.total ?? '—';

      const circuit = statusRes.circuit;
      if (circuit) {
        const remaining = circuit.remainingMs > 0
          ? ` (${Math.ceil(circuit.remainingMs / 1000)}초 남음)` : '';
        document.getElementById('circuit-status').innerHTML =
          `<span class="circuit-badge circuit-${circuit.state}">${circuit.state}${remaining}</span>`;
      }

      const agentsEl = document.getElementById('agents');
      agentsEl.innerHTML = (statusRes.agents ?? []).map(a => `<span class="badge">${a}</span>`).join('');

      const tbody = document.getElementById('runs');
      tbody.innerHTML = runsRes.map(r => {
        const errorBadge = r.error_type
          ? `<span style="font-size:0.7rem;color:#f85149;font-family:monospace">${r.error_type}</span> `
          : '';
        const preview = (r.output ?? '').replace(/</g,'&lt;').slice(0, 120);
        const isSelected = r.id === selectedRunId;
        return `<tr class="run-row${isSelected ? ' selected' : ''}" onclick="showRunDetail('${r.id}')">
          <td><span class="agent-name">${r.agent_name}</span></td>
          <td><span class="status ${r.status}">${r.status}</span></td>
          <td><span class="duration">${r.duration_ms ? (r.duration_ms / 1000).toFixed(1) + 's' : '—'}</span></td>
          <td><span class="duration">${r.num_turns ?? '—'}</span></td>
          <td>${errorBadge}<span class="output-preview">${preview}</span></td>
          <td><span class="duration">${r.started_at ? new Date(r.started_at).toLocaleString('ko-KR') : '—'}</span></td>
        </tr>`;
      }).join('');
    }

    function appendLiveLog(event) {
      const el = document.getElementById('live-log');
      const ts = event.ts ? new Date(event.ts).toLocaleTimeString('ko-KR') : '';
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-ts">${ts}</span><span class="log-type-${event.type}">${escHtml(event.data)}</span>`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function startLiveStream(runId) {
      if (liveEventSource) { liveEventSource.close(); liveEventSource = null; }
      document.getElementById('live-log').innerHTML = '';
      document.getElementById('live-log-section').style.display = '';

      const es = new EventSource(`/api/runs/${runId}/events`);
      liveEventSource = es;
      es.onmessage = (e) => {
        const evt = JSON.parse(e.data);
        if (evt.type === 'status') {
          es.close();
          liveEventSource = null;
          document.querySelector('.live-dot')?.remove();
          loadStats();
          setTimeout(() => refreshRunDetail(runId), 500);
        } else {
          appendLiveLog(evt);
        }
      };
      es.onerror = () => { es.close(); liveEventSource = null; };
    }

    async function refreshRunDetail(runId) {
      const run = await fetch(`/api/runs/${runId}`).then(r => r.json());
      renderRunDetail(run);
    }

    function renderRunDetail(run) {
      const chips = [
        `<span class="detail-chip">${run.agent_name}</span>`,
        `<span class="detail-chip"><span class="status ${run.status}" style="font-size:0.7rem">${run.status}</span></span>`,
        run.error_type ? `<span class="detail-chip error">${run.error_type}</span>` : '',
        run.stop_reason ? `<span class="detail-chip">stop: ${run.stop_reason}</span>` : '',
        run.num_turns ? `<span class="detail-chip">${run.num_turns}턴</span>` : '',
        run.tokens_in ? `<span class="detail-chip">in ${run.tokens_in} / out ${run.tokens_out} tok</span>` : '',
        run.trigger_source ? `<span class="detail-chip">트리거: ${run.trigger_source}${run.trigger_detail ? ' / ' + run.trigger_detail : ''}</span>` : '',
        run.workflow_run_id ? `<span class="detail-chip">workflow: ${run.workflow_run_id.slice(0,8)}</span>` : '',
      ].filter(Boolean).join(' ');

      document.getElementById('run-detail-meta').innerHTML = chips;
      if (run.output && run.output.trim()) {
        setOutput('run-detail-output', 'run-detail-output-toggle', run.output);
      } else {
        clearOutput('run-detail-output', 'run-detail-output-toggle');
        document.getElementById('run-detail-output').textContent = '(출력 없음)';
      }

      if (run.status !== 'RUNNING') {
        document.getElementById('live-log-section').style.display = 'none';
      }
    }

    async function showRunDetail(runId) {
      if (selectedRunId === runId) { closeRunDetail(); return; }
      if (liveEventSource) { liveEventSource.close(); liveEventSource = null; }
      selectedRunId = runId;
      document.querySelectorAll('tr.run-row').forEach(tr => {
        tr.classList.toggle('selected', tr.getAttribute('onclick') === `showRunDetail('${runId}')`);
      });

      const panel = document.getElementById('run-detail-panel');
      panel.style.display = '';
      document.getElementById('run-detail-meta').innerHTML = '<span style="color:#8b949e">불러오는 중...</span>';
      document.getElementById('live-log-section').style.display = 'none';
      clearOutput('run-detail-output', 'run-detail-output-toggle');

      const run = await fetch(`/api/runs/${runId}`).then(r => r.json());
      renderRunDetail(run);

      if (run.status === 'RUNNING') {
        startLiveStream(runId);
      }

      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    let projectList = [];
    let projectActiveIdx = -1;

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function renderProjectMenu() {
      const menu = document.getElementById('project-menu');
      if (!menu) return;
      const q = document.getElementById('project-input').value.trim().toLowerCase();
      const items = q ? projectList.filter(p => p.toLowerCase().includes(q)) : projectList;
      projectActiveIdx = -1;
      if (items.length === 0) {
        const msg = projectList.length === 0 ? '워크스페이스에 프로젝트가 없습니다' : '일치하는 프로젝트 없음';
        menu.innerHTML = `<div class="combobox-empty">${msg}</div>`;
        return;
      }
      menu.innerHTML = items.map(p =>
        `<div class="combobox-item" data-value="${escapeHtml(p)}">${escapeHtml(p)}</div>`
      ).join('');
    }

    function openProjectMenu() {
      renderProjectMenu();
      document.getElementById('project-combobox').classList.add('open');
    }

    function closeProjectMenu() {
      document.getElementById('project-combobox').classList.remove('open');
      projectActiveIdx = -1;
    }

    function isProjectMenuOpen() {
      return document.getElementById('project-combobox').classList.contains('open');
    }

    function setProjectValue(value) {
      document.getElementById('project-input').value = value;
      closeProjectMenu();
    }

    function moveProjectActive(delta) {
      const opts = [...document.querySelectorAll('#project-menu .combobox-item')];
      if (opts.length === 0) return;
      opts.forEach(o => o.classList.remove('active'));
      projectActiveIdx = (projectActiveIdx + delta + opts.length) % opts.length;
      const cur = opts[projectActiveIdx];
      cur.classList.add('active');
      cur.scrollIntoView({ block: 'nearest' });
    }

    function initProjectCombobox() {
      const input = document.getElementById('project-input');
      const toggle = document.getElementById('project-toggle');
      const menu = document.getElementById('project-menu');

      toggle.addEventListener('click', () => {
        isProjectMenuOpen() ? closeProjectMenu() : openProjectMenu();
      });
      input.addEventListener('focus', openProjectMenu);
      input.addEventListener('input', () => { renderProjectMenu(); document.getElementById('project-combobox').classList.add('open'); });
      menu.addEventListener('mousedown', (e) => {
        const item = e.target.closest('.combobox-item');
        if (item) { e.preventDefault(); setProjectValue(item.dataset.value); }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); if (!isProjectMenuOpen()) openProjectMenu(); else moveProjectActive(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); moveProjectActive(-1); }
        else if (e.key === 'Enter') {
          const opts = [...document.querySelectorAll('#project-menu .combobox-item')];
          if (isProjectMenuOpen() && projectActiveIdx >= 0 && opts[projectActiveIdx]) {
            e.preventDefault(); setProjectValue(opts[projectActiveIdx].dataset.value);
          }
        } else if (e.key === 'Escape') { closeProjectMenu(); }
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#project-combobox')) closeProjectMenu();
      });
    }

    async function loadProjects() {
      const res = await fetch('/api/config').then(r => r.json());
      const hint = document.getElementById('workspace-hint');
      if (hint) hint.textContent = `루트: ${res.workspaceRoot ?? ''}`;
      projectList = res.projects ?? [];
      if (isProjectMenuOpen()) renderProjectMenu();
    }

    function closeRunDetail() {
      if (liveEventSource) { liveEventSource.close(); liveEventSource = null; }
      selectedRunId = null;
      document.getElementById('run-detail-panel').style.display = 'none';
      document.getElementById('live-log-section').style.display = 'none';
      document.querySelectorAll('tr.run-row').forEach(tr => tr.classList.remove('selected'));
    }

    loadConfig();
    initProjectCombobox();
    loadProjects();
    loadStats();
    setInterval(loadStats, 10000);
  </script>
</body>
</html>
